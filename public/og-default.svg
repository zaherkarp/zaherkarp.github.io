<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Left accent line -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Name -->
  <text x="110" y="248" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="64" font-weight="700" fill="#f8fafc">Zaher Karp</text>

  <!-- Subtitle -->
  <text x="110" y="320" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="28" font-weight="400" fill="#94a3b8">Healthcare Data Engineering</text>

  <!-- Keywords -->
  <text x="110" y="400" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="18" font-weight="400" fill="#3b82f6">Medicare Stars  ·  HEDIS  ·  dbt  ·  SQL  ·  Python  ·  AWS</text>

  <!-- Domain -->
  <text x="110" y="540" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="20" font-weight="400" fill="#64748b">zaherkarp.com</text>

  <!-- Decorative dots -->
  <circle cx="1060" cy="200" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="1090" cy="200" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1120" cy="200" r="3" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1060" cy="230" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1090" cy="230" r="3" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1120" cy="230" r="3" fill="#3b82f6" opacity="0.1"/>
</svg>
