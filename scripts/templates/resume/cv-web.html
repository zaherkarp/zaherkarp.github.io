<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ name }}, Curriculum Vitae</title>
<meta name="description" content="Curriculum vitae for {{ name }}: experience, publications, presentations, and education in healthcare data engineering and health services research.">
<link rel="canonical" href="https://zaherkarp.com/cv.html">
<meta property="og:title" content="{{ name }}, Curriculum Vitae">
<meta property="og:description" content="Curriculum vitae for {{ name }}: experience, publications, presentations, and education in healthcare data engineering and health services research.">
<meta property="og:type" content="profile">
<meta property="og:url" content="https://zaherkarp.com/cv.html">
<meta property="og:image" content="https://zaherkarp.com/og-default.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/fonts/et-book/et-book.css">
<style>
/* This CV web template intentionally duplicates the resume web palette
   (scripts/templates/resume/resume-web.html) so the resume output stays
   byte-stable. The CV runs deliberately airier than the resume: wider
   leading and large inter-section space. CV-only rules are grouped under
   the "CV-only" comment. Keep the shared palette in sync by hand. */
:root {
  --paper:  #fffff8;
  --ink:    #111;
  --muted:  #6a6a6a;
  --rule:   #d0d0c8;
  --accent: #7a0000;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper:  #201b14;
    --ink:    #f5ecd7;
    --muted:  #c2b8a0;
    --rule:   #3a3024;
    --accent: #e05e3e;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 19px;
  background: var(--paper);
  color: var(--ink);
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  line-height: 1.7;
  background: var(--paper);
  color: var(--ink);
  max-width: 760px;
  margin: 0 auto;
  padding: 3.5rem 1.5rem 6rem;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-color: var(--rule);
  text-underline-offset: 2px;
}
a:hover { text-decoration-color: var(--ink); }

nav.top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 0.85rem;
  margin-bottom: 3rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--rule);
}
nav.top a { text-decoration: none; }
nav.top .right { color: var(--muted); }
nav.top .right a { color: var(--muted); }

h1 {
  font-size: 2.7rem;
  font-weight: normal;
  line-height: 1.05;
  margin-bottom: 0.4rem;
}

.contact {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 3rem;
}

h2 {
  font-style: italic;
  font-weight: normal;
  font-size: 1.4rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.3rem;
  margin: 3.2rem 0 1rem;
}

h2 + p {
  margin-bottom: 0.6rem;
}

p { margin-bottom: 0.7rem; }

.role {
  margin: 1.8rem 0 0.5rem;
}
.role-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1em;
  flex-wrap: wrap;
}
.role-where {
  font-size: 1.1rem;
}
.role-where .role-org {
  font-variant: small-caps;
  letter-spacing: 0.05em;
}
.role-where .role-sep {
  color: var(--muted);
  margin: 0 0.35em;
}
.role-date {
  font-size: 0.9rem;
  color: var(--muted);
  white-space: nowrap;
}
.role-stack {
  font-size: 0.88rem;
  color: var(--muted);
  margin-top: 0.25rem;
  margin-bottom: 0.5rem;
}

ul {
  list-style-type: disc;
  margin: 0.5rem 0 1rem 1.4rem;
}
li {
  margin-bottom: 0.4rem;
  line-height: 1.7;
}
li::marker { color: var(--muted); }

.skills p, .education p, .awards p {
  margin: 0.5rem 0;
}

/* ── CV-only sections ──────────────────────────────────────── */

.pubs .pub-entry-cv {
  margin: 0.9rem 0;
}
.pubs .pub-cite {
  margin: 0;
  padding-left: 1.4rem;
  text-indent: -1.4rem;
}
.pubs .pub-year { color: var(--muted); }
.pubs .pub-meta {
  font-size: 0.85rem;
  color: var(--muted);
}
.pubs .pub-meta a { color: var(--muted); }

/* Presentations: year-hung list (leading **YYYY** -> <strong>). */
.talks ul {
  list-style: none;
  margin: 0.6rem 0 0 0;
}
.talks li {
  line-height: 1.6;
  margin-bottom: 0.7rem;
  padding-left: 3.4rem;
  text-indent: -3.4rem;
}
.talks li strong {
  font-variant: normal;
  letter-spacing: 0;
  font-weight: normal;
  color: var(--muted);
}

/* Service: plain, generously spaced list. */
.service ul {
  list-style: none;
  margin: 0.6rem 0 0 0;
}
.service li {
  line-height: 1.6;
  margin-bottom: 0.55rem;
}
.grants p { margin: 0.5rem 0; }

em { font-style: italic; }
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

footer.page-footer {
  margin-top: 4rem;
  padding-top: 1rem;
  border-top: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.82rem;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
footer.page-footer a { color: var(--muted); }

@media print {
  nav.top, footer.page-footer { display: none; }
  body { max-width: none; padding: 0; }
  a { text-decoration: none; color: var(--ink); }
}
</style>
</head>

  <a href="/">← Zaher Karp</a>
