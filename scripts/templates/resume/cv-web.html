<style>
/* Traditional academic CV (web). Shares only the Tufte palette with the
   resume web template so the resume output stays byte-stable. CV-only
   structure (year-gutter lists, numbered citation list) lives below. */
:root {
  /* palette:light:start */
  --paper: #fffff8;
  --ink: #111;
  --muted: #6a6a6a;
  --rule: #d0d0c8;
  --accent: #0a5c54;
/* palette:light:end */
}
@media (prefers-color-scheme: dark) {
  :root {
    /* palette:dark:start */
    --paper: #16191d;
    --ink: #e6e8ea;
    --muted: #b4bac2;
    --rule: #2a2f36;
    --accent: #3fb0a0;
/* palette:dark:end */
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection      { background: color-mix(in srgb, var(--ink) 13%, var(--paper)); }
::-moz-selection { background: color-mix(in srgb, var(--ink) 13%, var(--paper)); }

html {
  font-size: 19px;
  background: var(--paper);
  color: var(--ink);
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  line-height: 1.7;
  background: var(--paper);
  color: var(--ink);
  max-width: 760px;
  margin: 0 auto;
  padding: 3.5rem 1.5rem 6rem;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-color: var(--rule);
  text-underline-offset: 2px;
}
a:hover { text-decoration-color: var(--ink); }

nav.top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 0.85rem;
  margin-bottom: 3rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--rule);
}
nav.top a { text-decoration: none; }
nav.top .right { color: var(--muted); }
nav.top .right a { color: var(--muted); }

h1 {
  font-size: 2.7rem;
  font-weight: normal;
  line-height: 1.05;
  margin-bottom: 0.4rem;
}

.contact {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 3rem;
}

h2 {
  font-style: italic;
  font-weight: normal;
  font-size: 1.4rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.3rem;
  margin: 3.2rem 0 1rem;
}

/* Subsection labels (### → <h3>): quiet muted small-caps. */
h3 {
  font-style: normal;
  font-variant: small-caps;
  font-weight: normal;
  font-size: 0.95rem;
  letter-spacing: 0.07em;
  color: var(--muted);
  margin: 1.7rem 0 0.4rem;
}

p { margin-bottom: 0.7rem; }
.interests p { margin-bottom: 0.4rem; }

/* ── Year-gutter lists (Education, Appointments, Presentations,
      Awards, Service): leading **YYYY** -> <strong> in a muted
      left column, entry text hanging beneath. */
ul {
  list-style: none;
  margin: 0.6rem 0 0 0;
  padding: 0;
}
li {
  line-height: 1.6;
  margin-bottom: 0.8rem;
  padding-left: 5.6rem;
  text-indent: -5.6rem;
}
li strong {
  font-variant: normal;
  font-weight: normal;
  letter-spacing: 0;
  color: var(--muted);
}

/* ── Publications: numbered academic citation list. */
.pubs ol.pub-cv-list {
  list-style: decimal;
  margin: 0.6rem 0 0 0;
  padding-left: 1.9rem;
}
.pubs li {
  padding-left: 0.4rem;
  text-indent: 0;
  margin-bottom: 0.9rem;
  line-height: 1.6;
}
.pubs li::marker { color: var(--muted); }
.pubs .pub-cited {
  color: var(--muted);
  font-size: 0.85rem;
}

.grants p { margin: 0.5rem 0; }

.skills p { margin: 0.5rem 0; }

em { font-style: italic; }
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* Standardized site footer (shared structure across the site) */
.site-footer {
  margin-top: 4rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.9rem;
}
.footer-nav a { font-variant: small-caps; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; }
.footer-nav a:hover { border-bottom: 1px solid var(--muted); }
.footer-nav .sep { margin: 0 0.55rem; color: var(--rule); }
.footer-meta { margin-top: 0.5rem; font-size: 0.82rem; color: var(--muted); }
.footer-meta a { color: var(--muted); }

@media (max-width: 600px) {
  li { padding-left: 4.2rem; text-indent: -4.2rem; }
}

@media print {
  nav.top, .site-footer { display: none; }
  body { max-width: none; padding: 0; }
  a { text-decoration: none; color: var(--ink); }
}
</style>
</head>
