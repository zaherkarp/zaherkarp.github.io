<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ name }}, Curriculum Vitae</title>
<style>
/* ETBook self-hosted (TTF for WeasyPrint). License: MIT,
   bundled at scripts/fonts/et-book/. Two weights only:
   roman + italic, no bold. Anything that requests a heavier
   weight is forbidden — WeasyPrint would synthesize it.

   This is a traditional academic CV, structured deliberately unlike the
   resume: Education leads, Publications are a numbered citation list, and
   appointments / talks / honors / service are plain dated lists with a
   left-gutter year column (no tech-stack lines, no achievement bullets).
   It shares only the Tufte palette + ETBook with the resume; the resume
   output stays byte-stable. */
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-roman-line-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-display-italic-old-style-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: italic;
}

/* Print: near-black ink on white, hairline gray rules. The CV is
   intentionally multi-page with wide breathing room. */
@page {
  size: auto;
  margin: 1in 1.1in;
}

:root {
  --text: #1a1a1a;
  --text-sec: #4a4a4a;
  --text-dim: #6a6a6a;
  --rule: #d0d0c8;
  --accent: #0a5c54;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 10.5pt;
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  color: var(--text);
  line-height: 1.6;
  background: white;
}

/* Name + contact. Generous space below the header. */
.hdr-name {
  font-family: 'et-book', Palatino, serif;
  font-size: 26pt;
  font-weight: normal;
  line-height: 1.1;
  letter-spacing: 0.01em;
  color: var(--text);
  margin-bottom: 7pt;
}
.hdr-contact {
  font-family: 'et-book', Palatino, serif;
  font-size: 10.5pt;
  color: var(--text-dim);
  letter-spacing: 0.02em;
  margin-bottom: 34pt;
}

/* Section headings (## → <h2>). Italic, hairline rule, large top margin. */
h2 {
  font-family: 'et-book', Palatino, serif;
  font-style: italic;
  font-size: 13pt;
  color: var(--text);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 5pt;
  margin: 30pt 0 13pt 0;
  page-break-after: avoid;
}

/* Subsection labels (### → <h3>): quiet muted small-caps, e.g. the
   Undergraduate / Graduate groupings under Education or the
   University / Community / Peer Review / Mentoring groupings under Service. */
h3 {
  font-family: 'et-book', Palatino, serif;
  font-style: normal;
  font-variant: small-caps;
  font-weight: normal;
  font-size: 10pt;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  margin: 15pt 0 4pt 0;
  page-break-after: avoid;
}

p {
  font-size: 10.5pt;
  line-height: 1.6;
  margin-bottom: 6pt;
}

/* Research interests: a short factual paragraph. */
.interests p { margin-bottom: 2pt; }

/* ── Year-gutter lists ─────────────────────────────────────────
   Education, Appointments, Presentations, Awards, and Service all
   render as a year-hung list: the leading **YYYY** (or **YYYY–YYYY**)
   in the markdown becomes <strong>, set in a muted left column, with
   the entry text hanging beneath it. */
ul {
  list-style: none;
  margin: 9pt 0 0 0;
  padding: 0;
}
li {
  font-size: 10.5pt;
  line-height: 1.6;
  margin-bottom: 9pt;
  padding-left: 5.6em;
  text-indent: -5.6em;
  page-break-inside: avoid;
}
li strong {
  font-variant: normal;
  font-weight: normal;
  letter-spacing: 0;
  color: var(--text-dim);
}

/* ── Publications: numbered academic citation list ───────────── */
.pubs ol.pub-cv-list {
  list-style: decimal;
  margin: 9pt 0 0 0;
  padding-left: 2em;
}
.pubs li {
  padding-left: 0.4em;
  text-indent: 0;
  margin-bottom: 11pt;
  page-break-inside: avoid;
}
.pubs li::marker { color: var(--text-dim); }
.pubs .pub-cited {
  color: var(--text-dim);
  font-size: 9.5pt;
}

/* Grants: short prose paragraph (no per-grant data to itemize). */
.grants p { margin: 6pt 0; }

/* Technical skills: small-caps category labels + inline list. */
.skills p {
  margin: 7pt 0;
  font-size: 10.5pt;
  line-height: 1.6;
}

/* Inline emphasis. No bold weight loaded; <strong> → small-caps,
   except inside list items, where the leading bold is a muted year. */
em { font-style: italic; }
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* Tighten widows/orphans near page breaks */
p, li { orphans: 2; widows: 2; }
</style>
</head>
<body>
{{ body | safe }}
</body>
</html>
