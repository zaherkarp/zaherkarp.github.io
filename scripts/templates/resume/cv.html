<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ name }}, Curriculum Vitae</title>
<style>
/* ETBook self-hosted (TTF for WeasyPrint). License: MIT,
   bundled at scripts/fonts/et-book/. Two weights only:
   roman + italic, no bold. Anything that requests a heavier
   weight is forbidden — WeasyPrint would synthesize it.

   This CV template intentionally duplicates the resume print
   palette/typography (scripts/templates/resume/resume.html) rather
   than sharing a partial, so the resume output stays byte-stable.
   The CV deliberately runs far airier than the 1–2 page resume:
   wide margins, generous leading, and large inter-section space.
   Keep the shared palette in sync by hand if it changes. */
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-roman-line-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-display-italic-old-style-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: italic;
}

/* Print: near-black ink on white, hairline gray rules. The CV is
   intentionally multi-page with wide breathing room; page-break-inside
   guards keep roles and publication entries from splitting. */
@page {
  size: auto;
  margin: 1in 1.1in;
}

:root {
  --text: #1a1a1a;
  --text-sec: #4a4a4a;
  --text-dim: #6a6a6a;
  --rule: #d0d0c8;
  --accent: #7a0000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 10.5pt;
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  color: var(--text);
  line-height: 1.6;
  background: white;
}

/* Name + contact. Generous space below the header before the first
   section sets the airy tone for the whole document. */
.hdr-name {
  font-family: 'et-book', Palatino, serif;
  font-size: 26pt;
  font-weight: normal;
  line-height: 1.1;
  letter-spacing: 0.01em;
  color: var(--text);
  margin-bottom: 7pt;
}
.hdr-contact {
  font-family: 'et-book', Palatino, serif;
  font-size: 10.5pt;
  color: var(--text-dim);
  letter-spacing: 0.02em;
  margin-bottom: 34pt;
}

/* Section headings (## → <h2>). Italic, hairline rule, no accent.
   Large top margin is the primary whitespace lever between sections. */
h2 {
  font-family: 'et-book', Palatino, serif;
  font-style: italic;
  font-size: 13pt;
  color: var(--text);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 5pt;
  margin: 30pt 0 13pt 0;
  page-break-after: avoid;
}

/* Summary paragraph (directly after Summary h2) */
h2 + p {
  font-size: 10.5pt;
  line-height: 1.6;
  margin-bottom: 2pt;
}

/* Role header block (post-processed <header class="role">) */
.role {
  margin: 20pt 0 0 0;
  page-break-inside: avoid;
}
.role-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1em;
}
.role-where {
  font-size: 11.5pt;
  color: var(--text);
}
.role-where .role-org {
  font-variant: small-caps;
  letter-spacing: 0.05em;
}
.role-where .role-sep {
  color: var(--text-dim);
  margin: 0 0.35em;
}
.role-date {
  font-family: 'et-book', Palatino, serif;
  font-size: 10.5pt;
  color: var(--text-dim);
  white-space: nowrap;
}
.role-stack {
  font-family: 'et-book', Palatino, serif;
  font-size: 10pt;
  color: var(--text-dim);
  margin-top: 4pt;
}

/* Experience bullets */
ul {
  list-style-type: disc;
  margin: 7pt 0 9pt 16pt;
  padding: 0;
}
li {
  margin-bottom: 5pt;
  line-height: 1.6;
  font-size: 10.5pt;
  page-break-inside: avoid;
}
li::marker { color: var(--text-dim); }

/* Skills: small-caps category labels + inline list */
.skills p {
  margin: 7pt 0;
  font-size: 10.5pt;
  line-height: 1.6;
}

/* Education: one entry per paragraph, generous separation */
.education p {
  margin: 8pt 0;
  font-size: 10.5pt;
  line-height: 1.6;
}

/* Awards / honors */
.awards p {
  margin: 8pt 0;
  font-size: 10.5pt;
  line-height: 1.6;
}

/* ── CV-only sections ──────────────────────────────────────── */

/* Publications (generated from publications.yaml). Hanging paragraphs;
   the year leads in muted figures, with roomy separation between entries. */
.pubs .pub-entry-cv {
  margin: 12pt 0;
  page-break-inside: avoid;
}
.pubs .pub-cite {
  font-size: 10.5pt;
  line-height: 1.6;
  text-indent: -1.4em;
  margin-left: 1.4em;
}
.pubs .pub-year {
  color: var(--text-dim);
}
.pubs .pub-title {
  /* plain regular; the venue (in <em>) carries the italic */
}
.pubs .pub-meta {
  font-size: 9.5pt;
  color: var(--text-dim);
}
.pubs .pub-meta a { color: var(--text-dim); }

/* Presentations: year-hung list. The leading **YYYY** in the markdown
   renders as <strong>; here the year sits in a left column and the text
   hangs beneath it, with generous space between entries. */
.talks ul {
  list-style: none;
  margin: 9pt 0 0 0;
  padding: 0;
}
.talks li {
  font-size: 10.5pt;
  line-height: 1.6;
  margin-bottom: 9pt;
  padding-left: 3.6em;
  text-indent: -3.6em;
}
.talks li strong {
  font-variant: normal;
  letter-spacing: 0;
  font-weight: normal;
  color: var(--text-dim);
}

/* Service: plain, generously spaced list (years sit at the end of each
   line, so no left year-column). */
.service ul {
  list-style: none;
  margin: 9pt 0 0 0;
  padding: 0;
}
.service li {
  font-size: 10.5pt;
  line-height: 1.6;
  margin-bottom: 8pt;
}
.grants p {
  font-size: 10.5pt;
  line-height: 1.6;
  margin: 8pt 0;
}

/* Inline emphasis. No bold weight loaded; <strong> → small-caps,
   except where a section above overrides it (year columns). */
em {
  font-style: italic;
}
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* Tighten widows/orphans near page breaks */
p, li { orphans: 2; widows: 2; }
</style>
</head>
<body>
{{ body | safe }}
</body>
</html>
