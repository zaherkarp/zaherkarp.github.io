<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ name }}, Resume</title>
<style>
/* ETBook self-hosted (TTF for WeasyPrint). License: MIT,
   bundled at scripts/fonts/et-book/. Two weights only:
   roman + italic, no bold. Anything that requests a heavier
   weight is forbidden — WeasyPrint would synthesize it. */
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-roman-line-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'et-book';
  src: url('file://{{ font_dir }}/et-book/et-book-display-italic-old-style-figures.ttf') format('truetype');
  font-weight: normal;
  font-style: italic;
}

/* Print: near-black ink on white, hairline gray rules. The
   oxford-red --accent token is kept in the palette for
   parity with the homepage but is deliberately unused on
   the resume — accent discipline (CLAUDE.md §Palette). */
@page {
  size: auto;
  margin: 0.45in 0.65in 0.45in 0.65in;
}

:root {
  --text: #1a1a1a;
  --text-sec: #4a4a4a;
  --text-dim: #6a6a6a;
  --rule: #d0d0c8;
  --accent: #7a0000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 10.5pt;
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  color: var(--text);
  line-height: 1.34;
  background: white;
}

/* Name + contact */
.hdr-name {
  font-family: 'et-book', Palatino, serif;
  font-size: 22pt;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 3pt;
}
.hdr-contact {
  font-family: 'et-book', Palatino, serif;
  font-size: 10pt;
  color: var(--text-dim);
  margin-bottom: 9pt;
}

/* Section headings (## → <h2>). Italic, the only running
   italic heading style on the site (rationale doc §Heading
   discipline). Hairline gray rule, no accent. */
h2 {
  font-family: 'et-book', Palatino, serif;
  font-style: italic;
  font-size: 11pt;
  color: var(--text);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1pt;
  margin: 7pt 0 3pt 0;
  page-break-after: avoid;
}

/* Summary paragraph (directly after Summary h2) */
h2 + p {
  font-size: 10pt;
  margin-bottom: 1pt;
}

/* Role header block (post-processed <header class="role">) */
.role {
  margin: 5pt 0 0 0;
  page-break-inside: avoid;
}
.role-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1em;
}
.role-where {
  font-size: 11pt;
  color: var(--text);
}
.role-where .role-org {
  font-variant: small-caps;
  letter-spacing: 0.05em;
}
.role-where .role-sep {
  color: var(--text-dim);
  margin: 0 0.35em;
}
.role-where .role-title {
  /* plain regular — hierarchy comes from small-caps on the org */
}
.role-date {
  font-family: 'et-book', Palatino, serif;
  font-size: 10pt;
  color: var(--text-dim);
  white-space: nowrap;
  /* ETBook's default Roman renders old-style figures, the bookish choice for inline numerics */
}
.role-stack {
  font-family: 'et-book', Palatino, serif;
  font-size: 9.5pt;
  color: var(--text-dim);
  margin-top: 2pt;
}

/* Experience bullets */
ul {
  list-style-type: disc;
  margin: 2pt 0 3pt 14pt;
  padding: 0;
}
li {
  margin-bottom: 1pt;
  line-height: 1.34;
  font-size: 10pt;
  page-break-inside: avoid;
}
li::marker { color: var(--text-dim); }

/* Skills: small-caps category labels (handled by the global
   strong rule below) followed by an inline comma-separated list. */
.skills p {
  margin: 1pt 0;
  font-size: 10pt;
  line-height: 1.34;
}

/* Education: one line per entry */
.education p {
  margin: 0;
  font-size: 10pt;
  line-height: 1.34;
}

/* Awards: single line, centered (kept for parity with build_resume.py
   wrap_sections; resume.md currently has no Awards section). */
.awards p {
  margin-top: 3pt;
  font-size: 10pt;
  color: var(--text-sec);
  text-align: center;
}

/* Inline emphasis. ETBook has no bold weight loaded, so any
   <strong> from the markdown source renders as small-caps —
   the structural-marker treatment Bringhurst sanctions for
   category prefixes ("Data platform:", "Healthcare domain:"). */
em {
  font-style: italic;
}
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* Tighten widows/orphans near page breaks */
p, li { orphans: 2; widows: 2; }
</style>
</head>
<body>
{{ body | safe }}
</body>
</html>
