<head>

<meta name="description" content="Resume for {{ name }}, data platform leader in regulated healthcare analytics.">
<link rel="canonical" href="https://zaherkarp.com/resume.html">
<meta property="og:title" content="{{ name }}, Resume">
<meta property="og:description" content="Resume for {{ name }}, data platform leader in regulated healthcare analytics.">
<meta property="og:type" content="profile">
<meta property="og:url" content="https://zaherkarp.com/resume.html">
<meta property="og:image" content="https://zaherkarp.com/og-default.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/fonts/et-book/et-book.css">
<style>
:root {
  /* palette:light:start */
  --paper: #f3f6f0;
  --ink: #161a16;
  --muted: #5b655c;
  --rule: #d6ddd3;
  --accent: #1d6835;
/* palette:light:end */
}
@media (prefers-color-scheme: dark) {
  :root {
    /* palette:dark:start */
    --paper: #141915;
    --ink: #e3e9e2;
    --muted: #a3ada4;
    --rule: #293029;
    --accent: #6fc082;
/* palette:dark:end */
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection      { background: color-mix(in srgb, var(--ink) 13%, var(--paper)); }
::-moz-selection { background: color-mix(in srgb, var(--ink) 13%, var(--paper)); }

html {
  font-size: 19px;
  background: var(--paper);
  color: var(--ink);
}

body {
  font-family: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  line-height: 1.55;
  background: var(--paper);
  color: var(--ink);
  max-width: 720px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 4rem;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-color: var(--rule);
  text-underline-offset: 2px;
}
a:hover { text-decoration-color: var(--ink); }

nav.top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 0.85rem;
  margin-bottom: 2rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--rule);
}
nav.top a { text-decoration: none; }
nav.top .right { color: var(--muted); }
nav.top .right a { color: var(--muted); }

h1 {
  font-size: 2.4rem;
  font-weight: normal;
  line-height: 1.05;
  margin-bottom: 0.25rem;
}

.contact {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 1.5rem;
}

h2 {
  font-style: italic;
  font-weight: normal;
  font-size: 1.25rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.15rem;
  margin: 1.8rem 0 0.6rem;
}

h2 + p {
  margin-bottom: 0.4rem;
}

p { margin-bottom: 0.5rem; }

.role {
  margin: 1rem 0 0.3rem;
}
.role-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1em;
  flex-wrap: wrap;
}
.role-where {
  font-size: 1.05rem;
}
.role-where .role-org {
  font-variant: small-caps;
  letter-spacing: 0.05em;
}
.role-where .role-sep {
  color: var(--muted);
  margin: 0 0.35em;
}
.role-date {
  font-size: 0.9rem;
  color: var(--muted);
  white-space: nowrap;
}
.role-stack {
  font-size: 0.88rem;
  color: var(--muted);
  margin-top: 0.1rem;
  margin-bottom: 0.3rem;
}

ul {
  list-style-type: disc;
  margin: 0.2rem 0 0.6rem 1.4rem;
}
li {
  margin-bottom: 0.15rem;
  line-height: 1.55;
}
li::marker { color: var(--muted); }

.skills p, .education p {
  margin: 0.15rem 0;
}

em { font-style: italic; }
strong {
  font-weight: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* Standardized site footer (shared structure across the site) */
.site-footer {
  margin-top: 3rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.9rem;
}
.footer-nav a { font-variant: small-caps; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; }
.footer-nav a:hover { border-bottom: 1px solid var(--muted); }
.footer-nav .sep { margin: 0 0.55rem; color: var(--rule); }
.footer-meta { margin-top: 0.5rem; font-size: 0.82rem; color: var(--muted); }
.footer-meta a { color: var(--muted); }

@media print {
  nav.top, .site-footer { display: none; }
  body { max-width: none; padding: 0; }
  a { text-decoration: none; color: var(--ink); }
}
</style>
</head>
