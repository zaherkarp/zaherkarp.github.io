    name: "SQL (T-SQL, PostgreSQL, MySQL / MariaDB, Redshift, Oracle)"
    category: "Engineering & data"
    level: core
    aliases: ["SQL", "T-SQL", "PostgreSQL", "Postgres", "MySQL", "MariaDB", "Redshift", "Oracle"]
    evidence:
