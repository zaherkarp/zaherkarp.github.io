# skills.yaml: single source of truth for Zaher Karp's skills.
#
# The keystone of the private job-search tooling (CLAUDE.md has no public
# surface for this yet; it is local dev tooling). Consumed by:
#   - scripts/_skills.py render_resume_skills() -> the resume "## Skills"
#     section. DEFERRED: written and unit-checked, but NOT wired into
#     build_resume.py until explicitly turned on. The skill list below is a
#     byte-exact port of the three current resume.md Skills lines so that the
#     first regeneration is a no-op diff.
#   - scripts/_skills.py render_jobfit_matrix() -> the private job-fit matrix
#     (jobsearch/out/jobfit-matrix.md; gitignored, never committed).
#   - scripts/lint_jobfit.py -> the evidence-gap report: any skill whose
#     `evidence` refs resolve to no public artifact prints as a work-search
#     item (a thing to write/ship before leaning on the claim).
#   - scripts/build_jobsearch.py packet -> matches a target job description's
#     wants against these skills (publicly-proven ones count toward coverage).
#
# Field notes (per skill entry):
#   id          slug; stable handle used by the lint/matrix and by the
#               outreach.yaml `motivating_skill` foreign key.
#   name        canonical display string, used VERBATIM in the resume line and
#               the matrix. Keep CMS program names in canonical casing and keep
#               the whole file em-dash-clean (it joins the chrome register the
#               moment render_resume_skills is wired in).
#   category    one of `categories_order` below; groups the resume line. First
#               appearance order within a category sets the order on the line.
#   aliases     optional alternate spellings the matcher also accepts when
#               comparing a skill against a job description's wants (e.g.
#               "Star Ratings" for "CMS Medicare Stars").
#   level       optional self-rating (core | working | familiar); matrix only.
#   evidence    list of public-proof refs, each {kind, ref}:
#                 kind: post    -> ref is a blog slug under src/content/blog/
#                 kind: project -> ref matches a project card title in index.html
#                 kind: role    -> ref matches an employer in resume.md
#               Empty or omitted => the skill is unproven (a work-search item).
#               The lint checks the artifact EXISTS and is public; it does not
#               verify the skill is named inside it (that stays your judgement).
#
# Em-dash policy (CLAUDE.md): keep this file em-dash-clean.

categories_order:
  - "Engineering & data"
  - "Cloud & BI"
  - "Healthcare"

# Private target archetypes: your own framing of the roles you are searching
# for. No employer data. `wants` are matched against skill name + aliases.
archetypes:
  - id: stars-platform-lead
    label: "Stars / MA quality platform lead"
    wants: ["CMS Medicare Stars", "HEDIS", "dbt", "SQL", "Python", "team leadership"]
  - id: healthcare-data-platform
    label: "Healthcare data platform / analytics engineering"
    wants: ["dbt", "Redshift", "AWS", "data modeling", "SQL", "Python"]

