# publications.yaml — single source of truth for Zaher Karp's publications.
#
# Consumed by two build steps:
#   - scripts/build_portfolio.py regenerates the homepage Publications block
#     (index.html, between <!-- pub-list:start --> ... <!-- pub-list:end -->)
#     and refreshes the cached `citations:` counts below from Semantic Scholar.
#   - scripts/build_resume.py renders the CV's Publications section (cv.pdf /
#     cv.html) from this same list, using the cached counts (no network call
#     during the resume/CV build).
#
# Field notes:
#   id          slug; drives the #pub-<id> / mn-<id> ids in the homepage markup.
#   year        publication year (oldstyle figure on the homepage).
#   title       plain text; HTML-escaped on render.
#   authors     plain text, trailing period included; HTML-escaped on render.
#   venue       journal/proceedings name, plain text; HTML-escaped, italicised.
#   detail      volume/issue/pages, trailing period included. May be empty.
#   toggle_aria aria-label for the homepage margin-note toggle (accessibility).
#   sid         optional Semantic Scholar id ("PMID:..." / "DOI:..."). When
#               present, the homepage entry gets class "entry pub-entry" +
#               data-sid, and build_portfolio refreshes `citations` below.
#   citations   cached integer count. Refreshed in place by build_portfolio;
#               omit for entries without a `sid`. On a failed/rate-limited
#               fetch the cached value is preserved.
#   links       list of {label, url, aria}. Rendered in the margin note (home)
#               and inline (CV). Mutually exclusive with `note`.
#   note        raw HTML margin-note prose (used instead of links). Only the
#               ACOs entry uses this today. Must NOT repeat the entry's
#               venue or year; both already render in the visible citation
#               line, and scripts/lint_notes.py fails the push on overlap.
#
# Em-dash policy (CLAUDE.md): keep this file em-dash-clean so the generated
# homepage chrome stays compliant with the pre-push grep.

