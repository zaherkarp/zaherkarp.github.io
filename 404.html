<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found, Zaher Karp</title>
<meta name="description" content="That page does not exist.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://gc.zgo.at">

<link rel="stylesheet" href="/fonts/et-book/et-book.css">

<style>
:root {
  /* palette:light:start */
  --bg: #f3f6f0;
  --text: #161a16;
  --text-sec: #3c443a;
  --muted: #5b655c;
  --rule: #d6ddd3;
  --accent: #1d6835;
/* palette:light:end */
  --font-body: 'et-book', Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
  --font-mono: 'Courier New', ui-monospace, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    /* palette:dark:start */
    --bg: #141915;
    --text: #e3e9e2;
    --text-sec: #c3ccc1;
    --muted: #a3ada4;
    --rule: #293029;
    --accent: #6fc082;
/* palette:dark:end */
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection      { background: color-mix(in srgb, var(--text) 13%, var(--bg)); }
::-moz-selection { background: color-mix(in srgb, var(--text) 13%, var(--bg)); }
html { font-size: 21px; background: var(--bg); color: var(--text); }
body { font-family: var(--font-body); line-height: 1.7; padding: 2rem 0 4rem; }
.page { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
nav { font-size: 0.78rem; margin-bottom: 3rem; }
nav a { color: var(--muted); text-decoration: none; }
nav a:hover { color: var(--accent); }
.code { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
h1 { font-size: 1.9rem; font-weight: normal; margin-bottom: 1rem; line-height: 1.25; }
p { color: var(--text-sec); margin-bottom: 1.5rem; max-width: 34em; }
a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
a:hover { border-bottom-color: var(--accent); }
/* Standardized site footer (shared structure across the site) */
.site-footer { border-top: 1px solid var(--rule); margin-top: 3rem; padding-top: 1.2rem; font-size: 0.9rem; color: var(--muted); }
.footer-nav a { font-variant: small-caps; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; border-bottom: none; }
.footer-nav a:hover { border-bottom: 1px solid var(--muted); }
.footer-nav .sep { margin: 0 0.55rem; color: var(--rule); }
</style>
</head>
<body>
<div class="page">
  <nav><a href="/">zaherkarp.com</a></nav>
  <p class="code">404</p>
  <h1>Page not found</h1>
  <p>That page does not exist, or it moved. The address bar still shows
     what you asked for, so a typo or a stale link is the usual cause.</p>
  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Site footer">
      <a href="/">Home</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="/blog/">Blog</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="/resume.html">Resume</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="/#contact">Contact</a>
    </nav>
  </footer>
</div>

<!-- GoatCounter, privacy-respecting page-view counter. Site code: zaher-karp.
     The path callback prefixes the recorded hit with "404" so every broken
     URL clusters under one group in the dashboard while preserving the path
     the visitor actually requested. -->
<script>
  window.goatcounter = { path: function (p) { return '404' + p; } };
</script>
<script data-goatcounter="https://zaher-karp.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
