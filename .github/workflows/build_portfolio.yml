name: Build portfolio

# Regenerates three pieces of build-time content in index.html:
#   - the 24-week activity-grid sparkline
#   - the homepage Writing section's six most recent post entries
#     (between <!-- writing-list:start --> ... <!-- writing-list:end -->)
#   - Semantic Scholar citation counts on each pub-entry
#
# Triggers:
#   - any push that touches index.html, the build script, or a blog post
#     (the activity grid + writing list depend on post frontmatter, so a
#     new post under src/content/blog/ auto-populates the homepage on the
#     same CI run that publishes it via build_blog.yml)
#   - weekly on Sundays to refresh citation counts even without code changes
#   - manual dispatch for ad-hoc rebuilds

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'scripts/build_portfolio.py'
      - 'scripts/requirements.txt'
      - 'src/content/blog/**.md'
      - '.github/workflows/build_portfolio.yml'
  schedule:
    - cron: '0 6 * * 0'  # Sundays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: build-portfolio
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history (not the default depth-1 shallow clone) so the
          # rebase-on-race step below always has the merge base. A shallow
          # clone makes `git rebase origin/main` fail when origin has moved,
          # which silently exhausted the old retry loop.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Regenerate activity grid, writing list, and citation counts
        run: python scripts/build_portfolio.py

      - name: Commit changes (if any)
        run: |
          set -euo pipefail
          git add index.html
          # Blog "thoughts" injected into the life-in-weeks grid.
          git add life-in-weeks/index.html
          # Dated citation snapshots accrete a longitudinal series the YAML
          # cache discards (record-on-change, so most runs add nothing).
          if [ -d data/snapshots ]; then git add data/snapshots; fi
          # Refreshed citation counts are written back into the YAML cache.
          if [ -f src/content/publications.yaml ]; then git add src/content/publications.yaml; fi

          if git diff --cached --quiet; then
            echo "No regenerated changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: regenerate activity grid, writing list, citations"

          # Push, retrying on a non-fast-forward. build_blog.yml /
          # build_resume.yml can land a commit on main while we build, so on
          # a rejected push we rebase onto the fresh origin/main and try
          # again. We push FIRST (no rebase when there is no race) and only
          # fetch+rebase on rejection; a failed rebase is aborted so the next
          # attempt starts clean instead of wedging on a half-applied state.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi
            echo "push attempt ${attempt} rejected; rebasing onto origin/main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "rebase failed on attempt ${attempt}; will retry after backoff"
            fi
            sleep $((attempt * 3))
          done
          echo "::error::could not push regenerated content after 5 attempts"
          exit 1
