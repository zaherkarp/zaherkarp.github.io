name: Critique

# Runs the critique pipeline against a target file in the repo (default:
# index.html) using Claude Code's GitHub Action, then commits the
# resulting critique artifact under critiques/.
#
# Independence contract (see CLAUDE.md §Critique pipeline):
#   - This workflow does NOT use anthropic/setup-anthropic or any
#     action that takes ANTHROPIC_API_KEY. The only secret it reads
#     is CLAUDE_CODE_OAUTH_TOKEN (subscription auth).
#   - No Python script in scripts/ imports the anthropic SDK; the
#     LLM engine is Claude Code, the codebase has no API coupling.
#   - The pre-push hook grep enforces both of the above on every push.
#
# Triggers:
#   - manual dispatch with an optional `target` input (default
#     index.html). Use this when iterating on a particular page or
#     post.
#   - first-of-month schedule, runs against index.html so the
#     portfolio gets a periodic fresh-eyes pass without anyone
#     having to remember.
# Deliberately not push-triggered: the workflow commits its artifact
# back to the branch, and a push-trigger would loop on that commit.
#
# Secret setup (one-time, repo owner): the CLAUDE_CODE_OAUTH_TOKEN
# repository secret must exist or every run fails before the critique
# starts (this is what killed the 2026-06-01 and 2026-07-01 scheduled
# runs). Generate a token locally with `claude setup-token`, then add
# it at Settings -> Secrets and variables -> Actions ->
# New repository secret, name CLAUDE_CODE_OAUTH_TOKEN. The preflight
# step below fails fast with this pointer if the secret is missing.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'File to critique (relative to repo root). See docs/critique/playbook.md §Supported targets.'
        required: false
        default: 'index.html'
        type: string
  schedule:
    - cron: '0 7 1 * *'  # 1st of month, 07:00 UTC

concurrency:
  group: critique-${{ github.ref }}
  cancel-in-progress: false

jobs:
  critique:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Preflight auth check
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$OAUTH_TOKEN" ]; then
            echo "::error::The CLAUDE_CODE_OAUTH_TOKEN repository secret is missing or empty, so the critique cannot authenticate. Fix: run 'claude setup-token' locally, then add the token as a repository secret named CLAUDE_CODE_OAUTH_TOKEN (Settings -> Secrets and variables -> Actions). See the header comment in .github/workflows/critique.yml."
            exit 1
          fi
          echo "CLAUDE_CODE_OAUTH_TOKEN secret is present."

      - uses: actions/checkout@v4

      - name: Resolve target
        id: target
        run: |
          target="${{ github.event.inputs.target }}"
          if [ -z "$target" ]; then
            target="index.html"
          fi
          if [ ! -f "$target" ]; then
            echo "Target file '$target' not found in the repo." >&2
            exit 1
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Target: $target"

      - name: Run critique playbook
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Headless CI denies file-modification tools by default (only
          # read-only Read/Grep/Glob are auto-allowed), so without this the
          # playbook reads every input but its Write of the critique artifact
          # is denied and the run "succeeds" having produced nothing (see the
          # 2026-07-04 run: success, permission_denials_count 2, no commit).
          # Grant exactly what the playbook needs: read the target + docs,
          # write one artifact under critiques/. No Edit (target is read-only),
          # no Bash/git (the next step commits). Keeps the independence
          # contract's tight secret/tool surface intact.
          claude_args: |
            --allowedTools "Read,Glob,Grep,Write"
          prompt: |
            Read docs/critique/playbook.md and execute it against
            ${{ steps.target.outputs.target }}. Follow every step in
            order. Write the output to the path the playbook
            computes under critiques/. Do not edit the target file.
            Do not commit anything; the workflow commits the artifact
            in the next step.

      - name: Commit critique artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet -- critiques/ || [ -n "$(git ls-files --others --exclude-standard critiques/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # claude-code-action reconfigures the repo's git auth for its own
            # commits, which strips the checkout's push credential; a plain
            # `git push` here then fails with "Authentication failed". Re-point
            # origin at the workflow GITHUB_TOKEN so this step can push. The job
            # has contents:write, and a GITHUB_TOKEN push does not re-trigger
            # workflows, which is exactly this pipeline's intent (no commit-loop).
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git add critiques/
            git commit -m "critique: $(basename '${{ steps.target.outputs.target }}') $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" && git push && exit 0
              echo "push attempt $i failed, retrying..."
              sleep 5
            done
            exit 1
          else
            echo "No critique artifact produced; nothing to commit."
          fi
