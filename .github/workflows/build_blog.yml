name: Build blog

on:
  push:
    branches: [main, master]
    paths:
      - 'src/content/blog/**'
      - 'scripts/build_blog.py'
      - 'scripts/templates/blog/**'
      - 'scripts/requirements.txt'
      - '.github/workflows/build_blog.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0  # full history so build_blog.py can read each post's actual last-modified commit date

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # If scripts/blog.config.yaml has redundancy.ci_blog_lint =
      # skip-if-cli-linted AND the triggering commit has the
      # Blog-CLI-Linted: trailer (written by `blog publish`), the two
      # lint steps below are skipped. Toggle defaults to `always`;
      # manage via `blog config set ci_blog_lint skip|always`.
      - name: Redundancy check (CLI pre-flight)
        id: redundancy
        run: |
          if python scripts/redundancy.py ci_blog_lint; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ci_blog_lint: skip (CLI pre-flighted, toggle on)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "ci_blog_lint: run (toggle off, or no trailer on HEAD)"
          fi

      - name: Lint vocabulary (canonical CMS program names)
        if: steps.redundancy.outputs.skip != 'true'
        run: python scripts/lint_vocab.py

      - name: Lint blog sources
        if: steps.redundancy.outputs.skip != 'true'
        run: python scripts/lint_blog.py

      - name: Build blog
        run: python scripts/build_blog.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No blog output changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate blog output"
          git push
