name: Build blog

on:
  push:
    branches: [main, master]
    paths:
      - 'src/content/blog/**'
      - 'scripts/build_blog.py'
      - 'scripts/templates/blog/**'
      - 'scripts/requirements.txt'
      - '.github/workflows/build_blog.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0  # full history so build_blog.py can read each post's actual last-modified commit date

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # If scripts/blog.config.yaml has redundancy.ci_blog_lint =
      # skip-if-cli-linted AND every commit in github.event.before
      # ..after carries the Blog-CLI-Linted: trailer (written by
      # `blog publish`), the two lint steps below are skipped. Toggle
      # defaults to `always`; manage via
      # `blog config set ci_blog_lint skip|always`.
      #
      # Falls back to a HEAD-only check for workflow_dispatch / schedule
      # triggers (no before/after). All-zeros `before` (new branch),
      # missing commits in a shallow clone, or any untrailered commit
      # in the range falls back to "run lints" inside redundancy.py.
      - name: Redundancy check (CLI pre-flight)
        id: redundancy
        env:
          BEFORE: ${{ github.event.before }}
          AFTER:  ${{ github.event.after }}
        run: |
          set -u
          if [ -n "${BEFORE:-}" ] && [ -n "${AFTER:-}" ]; then
            if python scripts/redundancy.py ci_blog_lint --range "$BEFORE" "$AFTER"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "ci_blog_lint: skip (every commit in $BEFORE..$AFTER CLI-linted, toggle on)"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "ci_blog_lint: run (toggle off, range unresolvable, or untrailered commit in range)"
            fi
          else
            # workflow_dispatch / schedule -- no push range; HEAD-only check.
            if python scripts/redundancy.py ci_blog_lint; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "ci_blog_lint: skip (HEAD CLI-linted, toggle on; no push range)"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "ci_blog_lint: run (no range; toggle off or HEAD untrailered)"
            fi
          fi

      - name: Lint vocabulary (canonical CMS program names)
        if: steps.redundancy.outputs.skip != 'true'
        run: python scripts/lint_vocab.py

      - name: Lint blog sources
        if: steps.redundancy.outputs.skip != 'true'
        run: python scripts/lint_blog.py

      - name: Build blog
        run: python scripts/build_blog.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No blog output changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate blog output"
          git push
