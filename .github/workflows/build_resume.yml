name: Build resume

on:
  push:
    branches: [main, master]
    paths:
      - 'src/content/resume.md'
      - 'scripts/build_resume.py'
      - 'scripts/templates/resume/**'
      - 'scripts/fonts/**'
      - 'scripts/requirements.txt'
      - '.github/workflows/build_resume.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build resume PDF
        run: python scripts/build_resume.py

      - name: Commit regenerated resume.pdf
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          if git diff --cached --quiet; then
            echo "No resume.pdf changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate resume.pdf"
          git push
