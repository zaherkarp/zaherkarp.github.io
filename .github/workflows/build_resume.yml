name: Build resume and CV

on:
  push:
    branches: [main, master]
    paths:
      - 'src/content/resume.md'
      - 'src/content/cv.md'
      - 'src/content/publications.yaml'
      - 'scripts/build_resume.py'
      - 'scripts/_publications.py'
      - 'src/content/skills.yaml'
      - 'scripts/_skills.py'
      - 'scripts/templates/resume/**'
      - 'scripts/fonts/**'
      - 'scripts/requirements.txt'
      - '.github/workflows/build_resume.yml'
  # Weekly, one hour after build_portfolio.yml refreshes the cached citation
  # counts in publications.yaml (Sundays 06:00 UTC). A GITHUB_TOKEN push does
  # not re-trigger workflows, so this cron is how the CV picks up the freshly
  # cached counts without a PAT.
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build resume and CV (PDF + HTML)
        run: python scripts/build_resume.py

      - name: Commit regenerated resume and CV artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf resume.html cv.pdf cv.html src/content/resume.md
          if git diff --cached --quiet; then
            echo "No resume/CV changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate resume + cv (pdf + html)"
          # Rebase onto any commits other build_* workflows may have pushed
          # in parallel for the same source push; retry a few times in case
          # the race repeats. Pattern mirrors build_portfolio.yml.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
