name: Build resume and CV

on:
  push:
    branches: [main, master]
    paths:
      - 'src/content/resume.md'
      - 'src/content/cv.md'
      - 'src/content/publications.yaml'
      - 'scripts/build_resume.py'
      - 'scripts/_publications.py'
      - 'src/content/skills.yaml'
      - 'scripts/_skills.py'
      - 'scripts/templates/resume/**'
      - 'scripts/fonts/**'
      - 'scripts/requirements.txt'
      - '.github/workflows/build_resume.yml'
  # The CV's Publications section renders cached Semantic Scholar counts
  # that build_portfolio.yml refreshes into publications.yaml on its weekly
  # Sundays-06:00-UTC run. A GITHUB_TOKEN push does not re-trigger workflows,
  # so build_portfolio's commit can't fire this build directly. Rather than
  # guess at the timing with a wall-clock cron (the old approach: a 07:00
  # cron that hoped portfolio had finished by then, and silently shipped
  # stale counts if it hadn't), we chain off the portfolio workflow
  # COMPLETING. The job-level `if` below gates this to the SCHEDULED (or
  # manually dispatched) portfolio run, so the frequent push-triggered
  # portfolio rebuilds (every blog post) don't churn the timestamped PDFs.
  workflow_run:
    workflows: ["Build portfolio"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # For a workflow_run trigger, only build when the upstream Build
    # portfolio run SUCCEEDED and was either the weekly SCHEDULED citation
    # refresh or a MANUAL dispatch (a deliberate "refresh + rebuild"). The
    # frequent push-triggered portfolio runs (every blog post) are excluded
    # so they don't churn the timestamped PDFs. Allowing workflow_dispatch
    # also makes the chain rehearsable on demand: manually run Build
    # portfolio and this build chains off it. push and workflow_dispatch
    # triggers of THIS workflow carry no workflow_run payload, so the first
    # clause lets them through.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       contains(fromJSON('["schedule", "workflow_dispatch"]'), github.event.workflow_run.event))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build resume and CV (PDF + HTML)
        run: python scripts/build_resume.py

      - name: Commit regenerated resume and CV artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf resume.html cv.pdf cv.html src/content/resume.md
          if git diff --cached --quiet; then
            echo "No resume/CV changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate resume + cv (pdf + html)"
          # Rebase onto any commits other build_* workflows may have pushed
          # in parallel for the same source push; retry a few times in case
          # the race repeats. Pattern mirrors build_portfolio.yml.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
