name: Lighthouse

on:
  pull_request:
    paths:
      - 'index.html'
      - 'blog.css'
      - 'src/content/blog/**'
      - 'scripts/build_blog.py'
      - 'scripts/templates/blog/**'
      - '.github/workflows/lighthouse.yml'
      - '.lighthouserc.json'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install build dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build blog
        run: python scripts/build_blog.py

      - name: Serve site
        run: |
          # Stock `python -m http.server` is single-threaded: Lighthouse opens
          # many parallel connections per page and they serialize behind one
          # another, inflating load time so badly that server-response-time,
          # bootup-time, main-thread-work, and even axe accessibility audits
          # intermittently collapse to a 0 score. ThreadingHTTPServer handles
          # the parallel requests concurrently and keeps the scores stable.
          python -c "from http.server import ThreadingHTTPServer, SimpleHTTPRequestHandler; ThreadingHTTPServer(('', 8000), SimpleHTTPRequestHandler).serve_forever()" &
          # Poll until the server accepts connections instead of a fixed sleep.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/ >/dev/null 2>&1; then echo "server up"; break; fi
            sleep 0.5
          done

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:8000/
            http://localhost:8000/blog/
            http://localhost:8000/blog/two-states-one-pathogen/
            http://localhost:8000/star-rating-predictor/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
